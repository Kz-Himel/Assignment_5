<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tailwind CSS + DaisyUi Link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Remix Icon Link -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Style Sheet Link -->
    <link rel="stylesheet" href="style.css" />

    <!-- Top Icon Link -->
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <title>Github Issue Tracker | Dashboard</title>
  </head>

  <body class="bg-[#f8fafc]">
    <!-- Navbar -->
    <nav class="navbar w-max-[1600px] px-[80px] py-[16px] bg-white shadow-sm">
      <div class="flex-1 flex items-center gap-2 hover:cursor-pointer">
        <a href="#">
          <img class="h-[36px]" src="assets/github-logo.png" alt="" />
        </a>
        <a href="#" class="font-bold text-2xl">GitHub Issues Tracker</a>
      </div>
      <div class="flex gap-2">
        <label class="input">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input type="search" class="grow" placeholder="Search issues..." />
        </label>
        <button class="btn btn-primary">
          <i class="ri-add-line"></i>New Issue
        </button>
      </div>
    </nav>

    <div class="content px-[14%]">

      <!-- Tabs -->

    <div class="bg-white flex gap-3 py-6 px-6 mt-[60px] shadow-xs rounded-[8px]">
      <button onclick="changeTab('all')"
        id="tab-all"
        onclick="changeTab('all')"
        class="tab-btn btn btn-primary w-[120px]"
      >
        All
      </button>

      <button onclick="changeTab('open')"
        id="tab-open"
        onclick="changeTab('open')"
        class="tab-btn tab-btn btn btn-natural w-[120px]"
      >
        Open
      </button>

      <button onclick="changeTab('closed')"
        id="tab-closed"
        onclick="changeTab('closed')"
        class="tab-btn tab-btn btn btn-natural w-[120px]"
      >
        Closed
      </button>
    </div>

    <div class="issue-content bg-white mt-4 rounded-[8px]">

      <!-- header -->
       <div class="issue-header p-6 flex justify-between items-center border-b-[1px] border-gray-400">
        <div class="right flex gap-2">
          <img class="h-[50px] w-auto" src="assets/Aperture.png" alt="">
          <div class="flex flex-col">
            <h2 id="issue-count" class="text-xl font-bold">50 Issues</h2>
            <p class="text-gray-500">Track and manage your project issues</p>
          </div>
        </div>

        <!-- left -->
         <div class="left flex gap-3">
          <div class="open flex items-center gap-2 ">
            <div class="circle h-3 w-3 rounded-full bg-green-700"></div>
            Open
          </div>
          <div class="closed flex items-center gap-2 ">
            <div class="circle h-3 w-3 rounded-full bg-purple-700"></div>
            Closed
          </div>
         </div>
       </div>

    </div>

    <hr class="text-gray-500 text-[1px]">

    <section id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6 bg-white">

       </section>


    </div>
    <script src="main.js"></script>
  </body>
</html>
